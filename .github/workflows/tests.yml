name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-serialization-dev libboost-system-dev

      - name: Sync deps
        run: uv sync --group ci

      - name: Build extension
        run: |
          cmake -S . -B build -DPython3_EXECUTABLE="$GITHUB_WORKSPACE/.venv/bin/python"
          cmake --build build -j --target _fsm

      - name: Run tests
        run: uv run --group ci python -m pytest -q tests
